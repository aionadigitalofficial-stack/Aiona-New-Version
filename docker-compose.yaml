# Dograh deployment stack — Coolify-ready version.
# Fixed vs. the original: YAML indentation under `expose:` blocks (was
# broken and would fail to parse), removed the nginx/dograh-init/coturn
# reliance on host ports 80/443 (those belong to Coolify's own Traefik),
# and added Traefik labels so Coolify's proxy actually routes to this stack.
#
# Required env vars to set in Coolify's Environment Variables tab:
#   PUBLIC_HOST, TURN_HOST, TURN_SECRET, OSS_JWT_SECRET, POSTGRES_PASSWORD,
#   REDIS_PASSWORD, MINIO_ROOT_USER, MINIO_ROOT_PASSWORD

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:7
    restart: unless-stopped
    expose:
      - "6379"
    command: >
      --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.dograh-audio.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/voice-audio`)"
      - "traefik.http.routers.dograh-audio.entrypoints=https"
      - "traefik.http.routers.dograh-audio.tls=true"
      - "traefik.http.routers.dograh-audio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dograh-audio.priority=20"
      - "traefik.http.services.dograh-audio.loadbalancer.server.port=9000"
    networks:
      - app-network
      - coolify

  # WebRTC media relay (UDP). Traefik cannot proxy this — these host ports
  # must be published AND opened in your server/cloud firewall.
  coturn:
    image: coturn/coturn:4.8.0
    container_name: coturn
    restart: unless-stopped
    command:
      - -n
      - "--listening-port=3478"
      - "--tls-listening-port=5349"
      - "--min-port=49152"
      - "--max-port=49200"
      - "--external-ip=${TURN_HOST}"
      - "--realm=dograh.com"
      - --use-auth-secret
      - "--static-auth-secret=${TURN_SECRET}"
      - --fingerprint
      - --no-cli
      - --no-multicast-peers
      - "--log-file=stdout"
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/udp"
    networks:
      - app-network

  api:
    image: ${REGISTRY:-dograhai}/dograh-api:${DOGRAH_VERSION:-latest}
    restart: unless-stopped
    environment:
      ENVIRONMENT: "production"
      LOG_LEVEL: "INFO"
      ENABLE_SIGNUP: "${ENABLE_SIGNUP:-true}"
      PUBLIC_BASE_URL: "https://${PUBLIC_HOST}"
      PUBLIC_HOST: "${PUBLIC_HOST}"
      BACKEND_API_ENDPOINT: "https://${PUBLIC_HOST}"
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-redissecret}@redis:6379"
      ENABLE_AWS_S3: "${ENABLE_AWS_S3:-false}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-}"
      S3_SIGNATURE_VERSION: "${S3_SIGNATURE_VERSION:-}"
      S3_ADDRESSING_STYLE: "${S3_ADDRESSING_STYLE:-}"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_PUBLIC_ENDPOINT: "https://${PUBLIC_HOST}"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_BUCKET: "voice-audio"
      MINIO_SECURE: "false"
      FASTAPI_WORKERS: "1"
      FORWARDED_ALLOW_IPS: "*"
      TURN_HOST: "${TURN_HOST:?TURN_HOST is required for WebRTC media}"
      TURN_SECRET: "${TURN_SECRET:?TURN_SECRET is required for WebRTC media}"
      FORCE_TURN_RELAY: "${FORCE_TURN_RELAY:-false}"
      OSS_JWT_SECRET: "${OSS_JWT_SECRET:?OSS_JWT_SECRET must be set to a strong secret}"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-true}"
      POSTHOG_API_KEY: "phc_ItizB1dP6yv7ZYobbcqrpxTdbomDA8hJFSEmAMdYvIr"
      POSTHOG_HOST: "https://us.i.posthog.com"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/v1/health'').read()"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.dograh-api.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/api/v1`)"
      - "traefik.http.routers.dograh-api.entrypoints=https"
      - "traefik.http.routers.dograh-api.tls=true"
      - "traefik.http.routers.dograh-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dograh-api.priority=10"
      - "traefik.http.services.dograh-api.loadbalancer.server.port=8000"
    networks:
      - app-network
      - coolify

  ui:
    image: ${REGISTRY:-dograhai}/dograh-ui:${DOGRAH_VERSION:-latest}
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      BACKEND_URL: "${BACKEND_URL:-http://api:8000}"
      NODE_ENV: "oss"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-true}"
      POSTHOG_KEY: "phc_ItizB1dP6yv7ZYobbcqrpxTdbomDA8hJFSEmAMdYvIr"
      POSTHOG_HOST: "https://us.posthog.com"
    expose:
      - "3010"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:3010 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.dograh-ui.rule=Host(`${PUBLIC_HOST}`)"
      - "traefik.http.routers.dograh-ui.entrypoints=https"
      - "traefik.http.routers.dograh-ui.tls=true"
      - "traefik.http.routers.dograh-ui.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dograh-ui.priority=1"
      - "traefik.http.services.dograh-ui.loadbalancer.server.port=3010"
      - "traefik.http.middlewares.dograh-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.dograh-ui-http.rule=Host(`${PUBLIC_HOST}`)"
      - "traefik.http.routers.dograh-ui-http.entrypoints=http"
      - "traefik.http.routers.dograh-ui-http.middlewares=dograh-https-redirect"
    networks:
      - app-network
      - coolify

volumes:
  postgres_data:
  redis_data:
  minio-data:
    driver: local

networks:
  app-network:
    driver: bridge
  coolify:
    external: true
